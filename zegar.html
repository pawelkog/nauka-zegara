<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zegar">
  <meta name="theme-color" content="#fff8f0">
  <title>Nauka Zegara</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fff8f0;
      --surface: #ffffff;
      --accent: #ff6b35;
      --accent2: #4ecdc4;
      --text: #2d2d2d;
      --text-dim: #888;
      --correct: #51cf66;
      --wrong: #ff6b6b;
      --radius: 20px;
      --star: #ffd43b;
    }
    html, body { min-height: 100%; background: var(--bg); font-family: 'Comic Sans MS', 'Chalkboard SE', 'Helvetica Rounded', sans-serif; color: var(--text); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .app { max-width: 420px; margin: 0 auto; min-height: 100vh; padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px); display: flex; flex-direction: column; align-items: center; gap: 16px; }

    /* HEADER */
    .header { width: 100%; text-align: center; }
    .header h1 { font-size: 28px; color: var(--accent); text-shadow: 2px 2px 0 rgba(255,107,53,0.2); }
    .score-row { display: flex; justify-content: center; gap: 20px; margin-top: 8px; }
    .score-box { background: var(--surface); border-radius: 12px; padding: 6px 16px; font-size: 15px; border: 2px solid #f0e0d0; }
    .score-box span { font-size: 20px; font-weight: bold; display: block; text-align: center; }
    .score-box .lbl { font-size: 11px; color: var(--text-dim); }
    .score-box.correct span { color: var(--correct); }
    .score-box.wrong span { color: var(--wrong); }
    .score-box.streak span { color: var(--star); }

    /* CLOCK */
    .clock-wrap { position: relative; width: 240px; height: 240px; }
    .clock-svg { width: 240px; height: 240px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.12)); }

    /* QUESTION */
    .question { font-size: 18px; text-align: center; color: var(--text-dim); min-height: 28px; }

    /* INPUT AREA */
    .input-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
    .time-input-row { display: flex; align-items: center; gap: 8px; }
    .time-part { width: 72px; height: 72px; border: 3px solid #ddd; border-radius: 16px; font-size: 32px; font-family: inherit; text-align: center; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .time-part:focus { border-color: var(--accent); }
    .time-part.correct { border-color: var(--correct); background: #f0fff4; }
    .time-part.wrong { border-color: var(--wrong); background: #fff0f0; }
    .colon { font-size: 40px; font-weight: bold; color: var(--text-dim); line-height: 1; padding-bottom: 4px; }
    .hint { font-size: 13px; color: var(--text-dim); }

    /* NUMPAD */
    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 220px; }
    .num-btn { height: 56px; border-radius: 14px; border: 2px solid #e8e0d8; background: var(--surface); font-size: 24px; font-family: inherit; cursor: pointer; color: var(--text); transition: transform 0.08s, background 0.08s; -webkit-tap-highlight-color: transparent; }
    .num-btn:active { transform: scale(0.93); background: #f0e8e0; }
    .num-btn.del { font-size: 18px; color: var(--wrong); }
    .num-btn.ok { background: var(--accent); color: white; border-color: var(--accent); font-size: 18px; }
    .num-btn.ok:active { background: #e05a28; }

    /* FEEDBACK */
    .feedback { font-size: 26px; min-height: 36px; text-align: center; font-weight: bold; transition: all 0.3s; }
    .feedback.correct { color: var(--correct); }
    .feedback.wrong { color: var(--wrong); }

    /* NEXT BTN */
    .next-btn { display: none; padding: 14px 40px; background: var(--accent2); color: white; border: none; border-radius: var(--radius); font-size: 20px; font-family: inherit; cursor: pointer; transition: transform 0.1s; }
    .next-btn:active { transform: scale(0.96); }
    .next-btn.visible { display: block; }

    /* LEVEL SELECTOR */
    .level-row { display: flex; gap: 8px; justify-content: center; width: 100%; }
    .level-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid #ddd; background: var(--surface); font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text-dim); }
    .level-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* CONFETTI */
    .confetti-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; top: -20px; border-radius: 2px; animation: confetti-fall linear forwards; }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* STARS */
    .stars { font-size: 28px; letter-spacing: 4px; min-height: 36px; text-align: center; }

    /* ACTIVE INPUT INDICATOR */
    .active-label { font-size: 12px; color: var(--accent); font-weight: bold; min-height: 16px; }
  </style>
</head>
<body>
<div class="app">
  <div class="confetti-wrap" id="confetti"></div>

  <div class="header">
    <h1>Nauka Zegara</h1>
    <div class="score-row">
      <div class="score-box correct"><span id="score-ok">0</span><div class="lbl">dobrze</div></div>
      <div class="score-box streak"><span id="score-streak">0</span><div class="lbl">seria</div></div>
      <div class="score-box wrong"><span id="score-bad">0</span><div class="lbl">błędy</div></div>
    </div>
  </div>

  <div class="level-row">
    <button class="level-btn active" onclick="setLevel('pelne')">Pełne</button>
    <button class="level-btn" onclick="setLevel('pol')">Co pół</button>
    <button class="level-btn" onclick="setLevel('kwadranse')">Kwadranse</button>
    <button class="level-btn" onclick="setLevel('wszystkie')">Wszystkie</button>
  </div>

  <div class="question" id="question">Która godzina?</div>

  <div class="clock-wrap">
    <svg class="clock-svg" viewBox="0 0 240 240" id="clock-svg">
      <!-- tarcza -->
      <circle cx="120" cy="120" r="110" fill="white" stroke="#e8e0d8" stroke-width="3"/>
      <circle cx="120" cy="120" r="104" fill="none" stroke="#f0e8e0" stroke-width="1"/>
      <!-- cyfry -->
      <text x="120" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2d2d2d" font-family="inherit">12</text>
      <text x="212" y="124" text-anchor="middle" font-size="18" font-weight="bold" fill="#2d2d2d" font-family="inherit">3</text>
      <text x="120" y="220" text-anchor="middle" font-size="18" font-weight="bold" fill="#2d2d2d" font-family="inherit">6</text>
      <text x="28" y="124" text-anchor="middle" font-size="18" font-weight="bold" fill="#2d2d2d" font-family="inherit">9</text>
      <!-- kreski minut -->
      <g id="tick-marks"></g>
      <!-- wskazówki -->
      <line id="hand-hour" x1="120" y1="120" x2="120" y2="60" stroke="#2d2d2d" stroke-width="7" stroke-linecap="round"/>
      <line id="hand-min"  x1="120" y1="120" x2="120" y2="38" stroke="#ff6b35" stroke-width="4" stroke-linecap="round"/>
      <!-- środek -->
      <circle cx="120" cy="120" r="7" fill="#2d2d2d"/>
      <circle cx="120" cy="120" r="3" fill="white"/>
    </svg>
  </div>

  <div class="stars" id="stars"></div>

  <div class="input-wrap">
    <div class="time-input-row">
      <input class="time-part" id="inp-h" type="text" inputmode="numeric" maxlength="2" placeholder="__" readonly>
      <span class="colon">:</span>
      <input class="time-part" id="inp-m" type="text" inputmode="numeric" maxlength="2" placeholder="__" readonly>
    </div>
    <div class="active-label" id="active-label">wpisz godzinę</div>
    <div class="numpad">
      <button class="num-btn" onclick="numPress('1')">1</button>
      <button class="num-btn" onclick="numPress('2')">2</button>
      <button class="num-btn" onclick="numPress('3')">3</button>
      <button class="num-btn" onclick="numPress('4')">4</button>
      <button class="num-btn" onclick="numPress('5')">5</button>
      <button class="num-btn" onclick="numPress('6')">6</button>
      <button class="num-btn" onclick="numPress('7')">7</button>
      <button class="num-btn" onclick="numPress('8')">8</button>
      <button class="num-btn" onclick="numPress('9')">9</button>
      <button class="num-btn del" onclick="numDel()">&#9003;</button>
      <button class="num-btn" onclick="numPress('0')">0</button>
      <button class="num-btn ok" onclick="checkAnswer()">OK</button>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Dalej ➡️</button>
</div>

<script>
  // ─── STATE ─────────────────────────────────────────
  let correctH = 0, correctM = 0;
  let scoreOk = 0, scoreBad = 0, streak = 0, maxStreak = 0;
  let level = 'pelne';
  let activeField = 'h';
  let answered = false;

  // ─── TICK MARKS ────────────────────────────────────
  (function drawTicks() {
    const g = document.getElementById('tick-marks');
    for (let i = 0; i < 60; i++) {
      const angle = (i * 6 - 90) * Math.PI / 180;
      const r1 = i % 5 === 0 ? 95 : 100;
      const r2 = 106;
      const x1 = 120 + r1 * Math.cos(angle);
      const y1 = 120 + r1 * Math.sin(angle);
      const x2 = 120 + r2 * Math.cos(angle);
      const y2 = 120 + r2 * Math.sin(angle);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('stroke', i % 5 === 0 ? '#bbb' : '#e0d8d0');
      line.setAttribute('stroke-width', i % 5 === 0 ? '2' : '1');
      g.appendChild(line);
    }
  })();

  // ─── CLOCK DRAWING ─────────────────────────────────
  function drawClock(h, m) {
    const hourAngle = ((h % 12) + m / 60) * 30 - 90;
    const minAngle = m * 6 - 90;
    const hr = 55, mr = 78;
    const hx = 120 + hr * Math.cos(hourAngle * Math.PI / 180);
    const hy = 120 + hr * Math.sin(hourAngle * Math.PI / 180);
    const mx = 120 + mr * Math.cos(minAngle * Math.PI / 180);
    const my = 120 + mr * Math.sin(minAngle * Math.PI / 180);
    document.getElementById('hand-hour').setAttribute('x2', hx);
    document.getElementById('hand-hour').setAttribute('y2', hy);
    document.getElementById('hand-min').setAttribute('x2', mx);
    document.getElementById('hand-min').setAttribute('y2', my);
  }

  // ─── LEVEL ─────────────────────────────────────────
  function setLevel(l) {
    level = l;
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    nextQuestion();
  }

  function randomTime() {
    let h = Math.floor(Math.random() * 12) + 1;
    let m;
    if (level === 'pelne') m = 0;
    else if (level === 'pol') m = Math.random() < 0.5 ? 0 : 30;
    else if (level === 'kwadranse') m = [0, 15, 30, 45][Math.floor(Math.random() * 4)];
    else m = Math.floor(Math.random() * 60);
    return { h, m };
  }

  // ─── NEXT QUESTION ─────────────────────────────────
  function nextQuestion() {
    answered = false;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('next-btn').classList.remove('visible');
    document.getElementById('inp-h').value = '';
    document.getElementById('inp-m').value = '';
    document.getElementById('inp-h').className = 'time-part';
    document.getElementById('inp-m').className = 'time-part';
    activeField = 'h';
    updateActiveLabel();

    const t = randomTime();
    correctH = t.h; correctM = t.m;
    drawClock(t.h, t.m);
    document.getElementById('question').textContent = 'Która godzina? 🕐';
    updateStars();
  }

  // ─── NUMPAD ────────────────────────────────────────
  function numPress(d) {
    if (answered) return;
    playTick();
    const inp = document.getElementById('inp-' + activeField);
    const cur = inp.value;

    if (activeField === 'h') {
      if (cur.length === 0) {
        if (d === '0') { inp.value = '0'; }
        else if (parseInt(d) <= 9) { inp.value = d; }
        if (parseInt(inp.value) > 1) { activeField = 'm'; updateActiveLabel(); }
      } else if (cur.length === 1) {
        const next = cur + d;
        const num = parseInt(next);
        if (num >= 1 && num <= 12) { inp.value = next; activeField = 'm'; updateActiveLabel(); }
        else if (num === 0 || num > 12) { inp.value = d; if (parseInt(d) > 1) { activeField = 'm'; updateActiveLabel(); } }
      }
    } else {
      if (cur.length < 2) {
        const next = cur + d;
        if (cur.length === 0 && parseInt(d) > 5) { inp.value = '0' + d; }
        else { inp.value = next; }
        if (inp.value.length === 2) { }
      }
    }
  }

  function numDel() {
    if (answered) return;
    playTick();
    const inp = document.getElementById('inp-' + activeField);
    if (inp.value.length > 0) {
      inp.value = inp.value.slice(0, -1);
    } else if (activeField === 'm') {
      activeField = 'h';
      updateActiveLabel();
      document.getElementById('inp-h').value = '';
    }
  }

  function updateActiveLabel() {
    const lbl = document.getElementById('active-label');
    lbl.textContent = activeField === 'h' ? '👆 wpisz godzinę' : '👆 wpisz minuty';
    document.getElementById('inp-h').style.boxShadow = activeField === 'h' ? '0 0 0 3px rgba(255,107,53,0.3)' : 'none';
    document.getElementById('inp-m').style.boxShadow = activeField === 'm' ? '0 0 0 3px rgba(255,107,53,0.3)' : 'none';
  }

  // ─── CHECK ─────────────────────────────────────────
  function checkAnswer() {
    if (answered) return;
    const hVal = parseInt(document.getElementById('inp-h').value);
    const mVal = parseInt(document.getElementById('inp-m').value || '0');

    if (isNaN(hVal)) {
      document.getElementById('feedback').textContent = 'Wpisz godzinę! 😊';
      document.getElementById('feedback').className = 'feedback wrong';
      return;
    }

    answered = true;
    const isCorrect = hVal === correctH && mVal === correctM;

    const mStr = String(correctM).padStart(2, '0');
    if (isCorrect) {
      scoreOk++;
      streak++;
      if (streak > maxStreak) maxStreak = streak;
      document.getElementById('feedback').textContent = randomPraise();
      document.getElementById('feedback').className = 'feedback correct';
      document.getElementById('inp-h').className = 'time-part correct';
      document.getElementById('inp-m').className = 'time-part correct';
      playSuccess();
      if (streak >= 3) launchConfetti();
    } else {
      scoreBad++;
      streak = 0;
      document.getElementById('feedback').textContent = `Nie! To była ${correctH}:${mStr} 🕐`;
      document.getElementById('feedback').className = 'feedback wrong';
      document.getElementById('inp-h').className = 'time-part wrong';
      document.getElementById('inp-m').className = 'time-part wrong';
      playWrong();
    }

    updateScores();
    updateStars();
    document.getElementById('next-btn').classList.add('visible');
    document.getElementById('active-label').textContent = '';
  }

  function randomPraise() {
    const p = ['Brawo! 🎉', 'Super! ⭐', 'Świetnie! 🌟', 'Doskonale! 🏆', 'Tak trzymaj! 👏', 'Genialnie! 🎊'];
    return p[Math.floor(Math.random() * p.length)];
  }

  // ─── SCORES ────────────────────────────────────────
  function updateScores() {
    document.getElementById('score-ok').textContent = scoreOk;
    document.getElementById('score-bad').textContent = scoreBad;
    document.getElementById('score-streak').textContent = streak;
  }

  function updateStars() {
    const s = document.getElementById('stars');
    if (streak === 0) { s.textContent = ''; return; }
    s.textContent = '⭐'.repeat(Math.min(streak, 5));
  }

  // ─── SOUNDS ────────────────────────────────────────
  let audioCtx = null;
  function getAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

  function playTick() {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      gain.gain.setValueAtTime(0.05, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
      osc.start(); osc.stop(ctx.currentTime + 0.08);
    } catch(e) {}
  }

  function playSuccess() {
    try {
      const ctx = getAudio();
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        osc.type = 'sine';
        const t = ctx.currentTime + i * 0.1;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.2, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
        osc.start(t); osc.stop(t + 0.35);
      });
    } catch(e) {}
  }

  function playWrong() {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      osc.start(); osc.stop(ctx.currentTime + 0.35);
    } catch(e) {}
  }

  // ─── CONFETTI ──────────────────────────────────────
  function launchConfetti() {
    const wrap = document.getElementById('confetti');
    wrap.innerHTML = '';
    const colors = ['#ff6b35','#4ecdc4','#ffd43b','#51cf66','#ff6b6b','#74c0fc'];
    for (let i = 0; i < 60; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (6 + Math.random() * 8) + 'px';
      el.style.height = (6 + Math.random() * 8) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = Math.random() * 0.5 + 's';
      wrap.appendChild(el);
    }
    setTimeout(() => { wrap.innerHTML = ''; }, 3000);
  }

  // ─── CLICK ON INPUT TO SWITCH FIELD ───────────────
  document.getElementById('inp-h').addEventListener('click', () => { if (!answered) { activeField = 'h'; updateActiveLabel(); } });
  document.getElementById('inp-m').addEventListener('click', () => { if (!answered) { activeField = 'm'; updateActiveLabel(); } });

  // ─── INIT ──────────────────────────────────────────
  nextQuestion();
</script>
</body>
</html>
